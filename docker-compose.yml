name: brasso

# Déploiement selfhosted (ADR-02) : app + PostgreSQL 16 + Caddy (TLS auto).
# Seul Caddy expose des ports ; l'API et la base restent sur le réseau interne.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?renseigner dans .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?renseigner dans .env}
      POSTGRES_DB: ${POSTGRES_DB:?renseigner dans .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      SESSION_SECRET: ${SESSION_SECRET:?renseigner dans .env}
    networks: [internal]
    # Pas de port publié : accès uniquement via Caddy.
    # healthcheck sur /health branché en M0-05 (serveur Fastify).

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [api]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?renseigner dans .env}
      ACME_EMAIL: ${ACME_EMAIL:?renseigner dans .env}
      API_PORT: ${API_PORT:-3000}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [internal]

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
